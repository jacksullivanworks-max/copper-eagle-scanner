<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copper Eagle Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1df;
      color: #1f1f1f;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    #status {
      margin: 12px 0 18px;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
    }

    .btn {
      display: inline-block;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
      margin: 6px;
    }

    .start {
      background: #4d805b;
      color: white;
    }

    .stop {
      background: #222;
      color: white;
    }

    .result-box {
      margin-top: 16px;
      padding: 14px;
      background: white;
      border-radius: 12px;
      min-height: 24px;
      white-space: pre-wrap;
      word-break: break-word;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Copper Eagle Scanner</h1>
    <div id="status">Ready to scan</div>

    <div id="reader"></div>

    <button class="btn start" onclick="startScanner()">Start Scanner</button>
    <button class="btn stop" onclick="stopScanner()">Stop Scanner</button>

    <div class="result-box" id="result">No scan yet</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrdRrZCx4Ud3UfoEd6Xg4kbxgUDaHgKqxSnnmiT8ERFa10bp3frjDwBCOmVkAwBvk1NQ/exec";

    let html5QrCode = null;
    let scannerRunning = false;
    let alreadySent = false;

    async function getCoords() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve("");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            resolve(position.coords.latitude + "," + position.coords.longitude);
          },
          () => resolve(""),
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
          }
        );
      });
    }

    async function sendToSheet(decodedText) {
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      status.textContent = "Getting location...";
      const coords = await getCoords();
      const scannedTime = new Date().toISOString();

      status.textContent = "Sending to sheet...";

      const url =
        APPS_SCRIPT_URL +
        "?code=" + encodeURIComponent(decodedText) +
        "&coords=" + encodeURIComponent(coords) +
        "&time=" + encodeURIComponent(scannedTime) +
        "&_ts=" + Date.now();

      const response = await fetch(url, { method: "GET" });
      const data = await response.json();

      if (data.success) {
        status.textContent = "Sheet updated";
        result.textContent =
          "Code: " + data.code +
          "\nRow: " + data.row +
          "\nCoords: " + (coords || "not captured") +
          "\nTime: " + scannedTime;
      } else {
        status.textContent = "Update failed";
        result.textContent =
          "Error: " + (data.error || "Unknown error") +
          "\nCode: " + decodedText;
      }
    }

    async function startScanner() {
      const status = document.getElementById("status");

      if (scannerRunning) {
        status.textContent = "Scanner already running";
        return;
      }

      try {
        alreadySent = false;
        status.textContent = "Requesting camera...";
        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          async (decodedText) => {
            if (alreadySent) return;
            alreadySent = true;

            status.textContent = "Scanned: " + decodedText;

            try {
              await sendToSheet(decodedText);
              await stopScanner();
            } catch (err) {
              status.textContent = "Send failed";
              document.getElementById("result").textContent = String(err);
              alreadySent = false;
            }
          },
          () => {}
        );

        scannerRunning = true;
        status.textContent = "Camera started";
      } catch (err) {
        status.textContent = "Error: " + err;
      }
    }

    async function stopScanner() {
      const status = document.getElementById("status");

      if (!html5QrCode || !scannerRunning) {
        status.textContent = "Scanner not running";
        return;
      }

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        scannerRunning = false;
        html5QrCode = null;
        status.textContent = "Scanner stopped";
      } catch (err) {
        status.textContent = "Stop error: " + err;
      }
    }
  </script>
</body>
</html>
