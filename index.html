<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copper Eagle Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1df;
      color: #1f1f1f;
      text-align: center;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    #status {
      margin: 12px 0 18px;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px;
    }

    .btn {
      display: inline-block;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
      margin: 6px;
    }

    .start {
      background: #4d805b;
      color: white;
    }

    .stop {
      background: #222;
      color: white;
    }

    .result-box {
      margin-top: 16px;
      padding: 14px;
      background: white;
      border-radius: 12px;
      min-height: 24px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Copper Eagle Scanner</h1>
    <div id="status">Ready to scan</div>

    <div id="reader"></div>

    <button class="btn start" onclick="startScanner()">Start Scanner</button>
    <button class="btn stop" onclick="stopScanner()">Stop Scanner</button>

    <div class="result-box" id="result">No scan yet</div>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    async function startScanner() {
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      if (scannerRunning) {
        status.textContent = "Scanner already running";
        return;
      }

      try {
        status.textContent = "Requesting camera...";
        html5QrCode = new Html5Qrcode("reader");

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: 250
          },
          (decodedText) => {
            result.textContent = decodedText;
            status.textContent = "QR scanned";
          },
          () => {}
        );

        scannerRunning = true;
        status.textContent = "Camera started";
      } catch (err) {
        status.textContent = "Error: " + err;
      }
    }

    async function stopScanner() {
      const status = document.getElementById("status");

      if (!html5QrCode || !scannerRunning) {
        status.textContent = "Scanner not running";
        return;
      }

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        scannerRunning = false;
        html5QrCode = null;
        status.textContent = "Scanner stopped";
      } catch (err) {
        status.textContent = "Stop error: " + err;
      }
    }
  </script>
</body>
</html>
